<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trading News Analyzer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ── Theme variables ─────────────────────────────────── */
        :root[data-theme="dark"] {
            --bg-base:   #070b14;
            --bg-card:   #0d1320;
            --bg-row:    #111827;
            --border:    #1e2a3b;
            --text:      #e2e8f0;
            --text-sub:  #94a3b8;
            --muted:     #64748b;
            --input-bg:  #0d1320;
            --toggle-bg: #1e293b;
            --green:     #10b981;
            --red:       #ef4444;
            --yellow:    #f59e0b;
            --blue:      #3b82f6;
            --shadow:    rgba(0,0,0,0.4);
        }
        :root[data-theme="light"] {
            --bg-base:   #f1f5f9;
            --bg-card:   #ffffff;
            --bg-row:    #f8fafc;
            --border:    #e2e8f0;
            --text:      #0f172a;
            --text-sub:  #475569;
            --muted:     #94a3b8;
            --input-bg:  #f8fafc;
            --toggle-bg: #e2e8f0;
            --green:     #059669;
            --red:       #dc2626;
            --yellow:    #d97706;
            --blue:      #2563eb;
            --shadow:    rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-base);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            transition: background 0.25s, color 0.25s;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Nav */
        nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 4px var(--shadow);
            transition: background 0.25s, border-color 0.25s;
        }
        .nav-link {
            font-size: 0.8rem; color: var(--muted);
            text-decoration: none; padding: 5px 10px;
            border-radius: 5px; transition: color 0.2s, background 0.2s;
        }
        .nav-link:hover { color: var(--text); background: var(--bg-row); }
        .nav-link.active { color: var(--green); font-weight: 600; }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 2px 8px var(--shadow);
            transition: background 0.25s, border-color 0.25s;
        }

        /* Status dots */
        .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .dot-green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .dot-yellow { background: var(--yellow); animation: pulse 1.5s ease-in-out infinite; }
        .dot-red    { background: var(--red); }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

        /* Gauge */
        .gauge-track { background: linear-gradient(to right,#7f1d1d,#dc2626,#f59e0b,#10b981,#065f46); border-radius:100px; height:10px; position:relative; }
        .gauge-thumb { width:14px; height:20px; background:var(--bg-card); border:2px solid var(--text); border-radius:3px; position:absolute; top:-5px; transform:translateX(-50%); transition:left 0.6s cubic-bezier(.22,.68,0,1.2); box-shadow: 0 0 6px var(--shadow); }

        /* Table */
        table { width:100%; border-collapse:collapse; font-size:0.8rem; }
        thead th { color:var(--muted); font-weight:600; font-size:0.7rem; text-transform:uppercase; letter-spacing:.05em; padding:9px 12px; border-bottom:1px solid var(--border); text-align:left; background:var(--bg-card); position:sticky; top:0; z-index:1; }
        tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; }
        tbody tr:hover { background:var(--bg-row); }
        tbody td { padding:9px 12px; vertical-align:middle; }

        /* Sentiment bars */
        .sent-bar { display:flex; gap:2px; align-items:center; }
        .sent-seg  { height:8px; border-radius:2px; }

        /* Score badge */
        .score-badge { font-size:0.75rem; font-weight:700; font-variant-numeric:tabular-nums; padding:2px 8px; border-radius:5px; white-space:nowrap; }
        .score-bull { background:rgba(16,185,129,.15); color:var(--green); }
        .score-bear { background:rgba(239,68,68,.15);  color:var(--red); }
        .score-neut { background:rgba(100,116,139,.12); color:var(--muted); }

        /* Relevance bar */
        .rel-bar  { height:6px; border-radius:3px; background:var(--border); overflow:hidden; width:50px; }
        .rel-fill { height:100%; border-radius:3px; background:var(--blue); }

        /* Inputs */
        input[type=text], input[type=number], input[type=url], textarea {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 7px;
            padding: 8px 11px;
            font-size: 0.82rem;
            outline: none;
            width: 100%;
            transition: border-color 0.2s, background 0.25s;
        }
        input:focus, textarea:focus { border-color: var(--blue); }

        /* Buttons */
        .btn { padding:7px 16px; border-radius:7px; font-size:0.8rem; font-weight:600; cursor:pointer; border:none; transition:opacity 0.2s,transform 0.1s; }
        .btn:hover   { opacity:0.88; }
        .btn:active  { transform:scale(0.97); }
        .btn-primary { background:var(--blue);  color:#fff; }
        .btn-success { background:var(--green); color:#fff; }
        .btn-danger  { background:var(--red);   color:#fff; }
        .btn-ghost   { background:transparent; color:var(--muted); border:1px solid var(--border); }

        /* Toggle switch (feed enable) */
        .toggle { position:relative; width:36px; height:20px; }
        .toggle input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; inset:0; background:var(--toggle-bg); border-radius:20px; cursor:pointer; transition:.3s; }
        .toggle-slider:before { content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.3s; }
        input:checked + .toggle-slider { background:var(--green); }
        input:checked + .toggle-slider:before { transform:translateX(16px); }

        /* Theme toggle button */
        .theme-btn {
            background: var(--toggle-bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .theme-btn:hover { background: var(--border); }
            /* Native tooltip enhancement */
        [title] { cursor: help; }
        .filter-label { border-bottom: 1px dashed var(--muted); font-size: 0.72rem; }
</style>
</head>
<body>
<!-- ── Navigation ─────────────────────────────────────────────── -->
<nav style="padding:0 24px;">
    <div style="display:flex; align-items:center; justify-content:space-between; height:52px;">
        <div style="display:flex; align-items:center; gap:28px;">
            <span style="font-weight:700; font-size:0.95rem; letter-spacing:-.01em;">
                📊 Trading<span style="color:var(--green);">News</span> AI
            </span>
            <div style="display:flex; gap:4px;">
                <a href="/"         class="nav-link {% if active_page=='dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/settings" class="nav-link {% if active_page=='settings'  %}active{% endif %}">Settings</a>
            </div>
        </div>

        <div style="display:flex; align-items:center; gap:14px;">
            <!-- Model status -->
            <div id="model-status-badge" style="display:flex; align-items:center; gap:6px; font-size:0.72rem; color:var(--muted);">
                {% if model.ready %}
                    <span class="dot dot-green"></span> FinBERT ready
                {% elif model.loading %}
                    <span class="dot dot-yellow"></span> Loading model…
                {% else %}
                    <span class="dot dot-red"></span> Model error
                {% endif %}
            </div>
            <div id="feed-count-badge" style="font-size:0.72rem; color:var(--muted);">— feeds</div>
            <div id="last-update"      style="font-size:0.72rem; color:var(--muted); opacity:.5;">UTC —</div>

            <!-- ☀/🌙 Theme toggle -->
            <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
                <span id="theme-icon">☀️</span>
                <span id="theme-label">Light</span>
            </button>
        </div>
    </div>
</nav>

<main style="padding:20px 24px;">
    {% block content %}{% endblock %}
</main>

<script>
    // ── Theme ──────────────────────────────────────────────────────
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const icon  = document.getElementById('theme-icon');
        const label = document.getElementById('theme-label');
        if (theme === 'light') { icon.textContent = '🌙'; label.textContent = 'Dark'; }
        else                   { icon.textContent = '☀️'; label.textContent = 'Light'; }
        localStorage.setItem('tna-theme', theme);
    }
    function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme');
        applyTheme(cur === 'dark' ? 'light' : 'dark');
    }
    // Apply saved preference immediately
    const saved = localStorage.getItem('tna-theme') || 'dark';
    applyTheme(saved);

    // ── Status poller ──────────────────────────────────────────────
    async function pollStatus() {
        try {
            const d = await (await fetch('/api/status')).json();
            const badge = document.getElementById('model-status-badge');
            if      (d.model.ready)   badge.innerHTML = '<span class="dot dot-green"></span> FinBERT ready';
            else if (d.model.loading) badge.innerHTML = '<span class="dot dot-yellow"></span> Loading model…';
            else                      badge.innerHTML = '<span class="dot dot-red"></span> Model error';
            const fc = document.getElementById('feed-count-badge');
            if (fc) fc.textContent = d.feeds + ' feed' + (d.feeds !== 1 ? 's' : '');
            const lu = document.getElementById('last-update');
            if (lu) lu.textContent = 'UTC ' + new Date().toISOString().slice(11,19);
        } catch(e) {}
    }
    pollStatus();
    setInterval(pollStatus, 8000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
